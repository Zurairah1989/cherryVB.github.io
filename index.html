<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cherry's Adventure Game 🐱</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
    }

    body {
        min-height: 100vh;
        background: linear-gradient(135deg, #ffe6f0, #fff7fb);
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 30px;
        cursor: pointer;
        position: relative;
        overflow-x: hidden;
    }

    body::before {
        content: "Cherry Cherry Cherry Cherry Cherry Cherry Cherry";
        position: absolute;
        width: 200%;
        height: 200%;
        font-size: 60px;
        color: rgba(255, 77, 141, 0.08);
        transform: rotate(-25deg);
        line-height: 140px;
        animation: moveBg 25s linear infinite;
        white-space: pre-wrap;
        z-index: 0;
    }

    @keyframes moveBg {
        from { transform: translate(0,0) rotate(-25deg); }
        to { transform: translate(-200px,-200px) rotate(-25deg); }
    }

    .card {
        position: relative;
        z-index: 1;
        background: rgba(255,255,255,0.92);
        padding: 35px;
        border-radius: 25px;
        width: 95%;
        max-width: 750px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }

    h1 {
        text-align: center;
        color: #ff4d8d;
        font-size: 2.8rem;
    }

    .story {
        margin-top: 20px;
        background: #fff0f6;
        padding: 20px;
        border-radius: 15px;
        border-left: 6px solid #ff4d8d;
        color: #444;
        line-height: 1.7;
        min-height: 120px;
    }

    .choices {
        margin-top: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    button.choice {
        padding: 12px;
        border: none;
        border-radius: 12px;
        background: #ff4d8d;
        color: white;
        cursor: pointer;
        transition: 0.3s;
        font-size: 1rem;
    }

    button.choice:hover {
        background: #ff2d73;
        transform: scale(1.03);
    }

    .floating-cat {
        position: absolute;
        font-size: 28px;
        animation: floatUp 1.5s ease-out forwards;
        pointer-events: none;
        z-index: 999;
    }

    @keyframes floatUp {
        0% { opacity: 1; transform: translateY(0); }
        100% { opacity: 0; transform: translateY(-160px) scale(1.5); }
    }

</style>
</head>

<body>

<div class="card">

    <h1>🐱 Cherry Adventure Game</h1>

    <div id="story" class="story">
        Cherry wakes up in her cozy pink bed. She hears a strange sound from the kitchen...
        What should she do?
    </div>

    <div class="choices">
        <button class="choice" onclick="choose('explore')">🐾 Go explore the kitchen</button>
        <button class="choice" onclick="choose('sleep')">😴 Ignore it and go back to sleep</button>
        <button class="choice" onclick="choose('callfriend')">🐈 Call her cat friend for help</button>
    </div>

</div>

<script>
function choose(option) {
    const story = document.getElementById("story");

    if(option === "explore") {
        story.innerHTML = `
        Cherry slowly walks into the kitchen... 🍽️  
        She sees a glowing box under the table.  
        It is moving... what could it be?  
        <br><br>What should Cherry do next?
        `;

        setChoices([
            ["Open the box 🎁", "openBox"],
            ["Sniff it carefully 👃", "sniffBox"],
            ["Run away 😱", "runAway"]
        ]);
    }

    else if(option === "sleep") {
        story.innerHTML = `
        Cherry curls back into her bed 😴  
        But suddenly... the sound gets louder!  
        She cannot ignore it anymore...
        `;

        setChoices([
            ["Finally check it 👀", "explore"],
            ["Cover her ears 🙉", "ignore"]
        ]);
    }

    else if(option === "callfriend") {
        story.innerHTML = `
        Cherry calls her lovely cat friend 🐈💕  
        They arrive together and hear the sound...  
        Now they are stronger as a team!
        `;

        setChoices([
            ["Investigate together 🐾", "explore"],
            ["Play instead 🎉", "play"]
        ]);
    }

    else if(option === "openBox") {
        story.innerHTML = `
        The box opens slowly...  
        A tiny kitten jumps out! 😻  
        It was just a lost baby cat looking for help.
        <br><br>Cherry feels happy and safe 💖
        `;

        setChoices([
            ["End Story 🌸", "end"]
        ]);
    }

    else if(option === "sniffBox") {
        story.innerHTML = `
        Cherry sniffs the box carefully...  
        It smells like milk and warmth 🥛  
        Something cute is inside...
        `;

        setChoices([
            ["Open it 🎁", "openBox"],
            ["Leave it 😺", "end"]
        ]);
    }

    else if(option === "runAway") {
        story.innerHTML = `
        Cherry runs away fast! 💨  
        But she trips and knocks the box open accidentally...  
        Something adorable appears!
        `;

        setChoices([
            ["Look closely 👀", "openBox"]
        ]);
    }

    else if(option === "play") {
        story.innerHTML = `
        Cherry and her friend start playing instead 🎉  
        The mystery can wait... happiness comes first 💖
        `;

        setChoices([
            ["End Story 🌸", "end"]
        ]);
    }

    else if(option === "end") {
        story.innerHTML = `
        🌸 The End 🌸  
        Cherry had a lovely adventure full of surprises and love 💕
        `;
        setChoices([]);
    }
}

function setChoices(options) {
    const container = document.querySelector(".choices");
    container.innerHTML = "";

    options.forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "choice";
        btn.innerText = opt[0];
        btn.onclick = () => choose(opt[1]);
        container.appendChild(btn);
    });
}

// floating cats on click
document.addEventListener("click", function(e) {
    const cat = document.createElement("div");
    const emojis = ["🐱","🐈","🐾","😺","😻","💖"];

    cat.innerText = emojis[Math.floor(Math.random()*emojis.length)];
    cat.classList.add("floating-cat");

    cat.style.left = e.clientX + "px";
    cat.style.top = e.clientY + "px";

    document.body.appendChild(cat);

    setTimeout(() => cat.remove(), 1500);
});
</script>

</body>
</html>
