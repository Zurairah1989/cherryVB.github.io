<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cherry's World 🐱</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
    }

    body {
        min-height: 100vh;
        overflow: hidden;
        background: linear-gradient(135deg, #ffe6f0, #fff7fb);
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        cursor: pointer;
    }

    /* Cherry background text */
    body::before {
        content: "Cherry Cherry Cherry Cherry Cherry Cherry Cherry Cherry";
        position: absolute;
        top: 0;
        left: 0;
        width: 200%;
        height: 200%;
        font-size: 60px;
        color: rgba(255, 77, 141, 0.08);
        transform: rotate(-25deg);
        line-height: 140px;
        z-index: 0;
        animation: moveBg 25s linear infinite;
        white-space: pre-wrap;
    }

    @keyframes moveBg {
        from { transform: translate(0,0) rotate(-25deg); }
        to { transform: translate(-200px,-200px) rotate(-25deg); }
    }

    .card {
        position: relative;
        z-index: 1;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(10px);
        padding: 40px;
        border-radius: 25px;
        width: 90%;
        max-width: 700px;
        text-align: center;
        box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }

    h1 {
        font-size: 3rem;
        color: #ff4d8d;
    }

    p {
        margin-top: 15px;
        color: #555;
        line-height: 1.6;
        font-size: 1.1rem;
    }

    .btn {
        margin-top: 25px;
        padding: 12px 25px;
        border: none;
        border-radius: 50px;
        background: #ff4d8d;
        color: white;
        font-size: 1rem;
        cursor: pointer;
    }

    /* Floating cats animation */
    .floating-cat {
        position: absolute;
        font-size: 30px;
        animation: floatUp 1.5s ease-out forwards;
        pointer-events: none;
        z-index: 999;
    }

    @keyframes floatUp {
        0% {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        100% {
            opacity: 0;
            transform: translateY(-150px) scale(1.5);
        }
    }
</style>

</head>

<body>

<div class="card">
    <h1>Cherry 🐱</h1>
    <p>
        Welcome to Cherry’s world 🌸 Click anywhere and watch cute cats appear!
    </p>
    <button class="btn">Explore Cherry</button>
</div>

<script>
document.addEventListener("click", function(e) {
    const cat = document.createElement("div");

    const cats = ["🐱", "🐈", "🐾", "😺", "😻"];
    cat.innerText = cats[Math.floor(Math.random() * cats.length)];

    cat.classList.add("floating-cat");

    cat.style.left = e.clientX + "px";
    cat.style.top = e.clientY + "px";

    document.body.appendChild(cat);

    setTimeout(() => {
        cat.remove();
    }, 1500);
});
</script>

</body>
</html>
